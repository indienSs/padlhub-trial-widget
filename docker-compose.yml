services:
  mongo:
    image: mongo:7
    container_name: padlhub-trial-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-}
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
